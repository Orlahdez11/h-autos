<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Admin - H-CARS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: #111; padding: 2rem; border-radius: 15px; border: 1px solid #c9a84c; width: 100%; max-width: 400px; }
        .btn-gold { background: #c9a84c; color: black; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card shadow-lg">
        <h2 class="text-center mb-4">Panel Admin</h2>
        <form id="formLogin">
            <div class="mb-3">
                <label class="form-label">Contraseña de Administrador</label>
                <input type="password" id="password" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <button type="submit" class="btn btn-gold w-100">Entrar</button>
            <div id="errorMsg" class="text-danger mt-3 text-center" style="display:none;"></div>
        </form>
    </div>

    <script>
        document.getElementById("formLogin").addEventListener("submit", async (e) => {
            e.preventDefault();
            const password = document.getElementById("password").value;
            
            const res = await fetch("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password })
            });

            const data = await res.json();

            if (res.ok) {
                localStorage.setItem("adminKey", data.apiKey);
                window.location.href = "admin.html";
            } else {
                const error = document.getElementById("errorMsg");
                error.textContent = data.error;
                error.style.display = "block";
            }
        });
    </script>
</body>
</html>
